<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juego Cazando</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="cazando.css" />
</head>
<body onload="iniciarJuego();">
  <main class="pantalla-juego">
    <section class="juego-card">
      <header class="encabezado">
        <h1>Juego Cazando</h1>
        <p>Autor: Cristian Peña</p>
      </header>

      <section class="layout-juego">
        <section class="zona-juego">
          <div class="marco-canvas">
            <canvas id="areaJuego" width="500" height="500"></canvas>
          </div>
        </section>

        <aside class="panel-lateral">
          <section class="marcadores">
            <article class="card-info">
              <span class="label-info">Puntos</span>
              <span id="puntos" class="valor-info">0</span>
            </article>

            <article class="card-info">
              <span class="label-info">Tiempo</span>
              <span id="tiempo" class="valor-info">15</span>
            </article>
          </section>

          <section>
            <div class="play-info">
              <p id="txtPlayInfo">Atrapa Tu Plato de Comida❗</p>
            </div>
          </section>

          <section class="controles">
            <button class="btn-mov btn-arriba" onclick="moverArriba();">⬆</button>
            <div class="fila-centro">
              <button class="btn-mov" onclick="moverIzquierda();">⬅</button>
              <button class="btn-mov" onclick="moverAbajo();">⬇</button>
              <button class="btn-mov" onclick="moverDerecha();">➡</button>
            </div>
          </section>

          <section class="acciones">
            <button class="btn-reiniciar" onclick="reiniciarJuego();">Reiniciar</button>
          </section>

          <section class="ayuda-juego">
            <p class="ayuda-desktop">
              Puedes Usar: <strong>W - A - S - D</strong> o <strong>↑ ← ↓ →</strong>
            </p>
            <p class="ayuda-mobile">
              Mobile: usa los botones táctiles para mover al gato
            </p>
          </section>
          <p id="mensaje"></p>

        </aside>
      </section>
    </section>
  </main>

    <div id="avisoMobile" class="aviso-mobile oculto">
      <div class="aviso-mobile-card">
        <h2>¡Tip de juego!</h2>
        <p>
          En celular puedes mover al gato usando los botones táctiles:
          arriba, izquierda, abajo y derecha.
        </p>
        <button id="btnCerrarAviso" class="btn-aviso">Entendido</button>
      </div>
    </div>

  <script src="cazando.js"></script>
  <script src="utils.js"></script>
</body>
</html>
